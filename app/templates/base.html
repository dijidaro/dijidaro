<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for("static", filename="styles/small.css" ) }}">
    <link rel="stylesheet" href="{{ url_for("static", filename="styles/medium.css" ) }}">
    <link rel="stylesheet" href="{{ url_for("static", filename="styles/large.css" ) }}">
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!--Bootstrap Icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
    <header>
        <div id="header" class="container">
            <a class="logo me-2" href="#">
                <img src="../static/images/dijidaro-logo.png" alt="dijidaro logo" height="30">
            </a>
            <a class="hamburger" href="#navbar" aria-label="Open navigation panel.">
                <span class="visually-hidden">Open navigation panel</span>
                <i class="bi bi-list" aria-hidden="true"></i>
            </a>
            <nav id="navbar">
                <ul class="mx-auto">
                    <li><a href="#">Explore</a></li>
                    <li><a href="#">Upload</a></li>
                    <li><a href="#">Help&nbsp;Us</a></li>
                    <li><a href="#">About</a></li>
                    <li class="mx-3 d-flex align-items-center justify-content-center">
                        <form action="" role="search">
                            <input class="form-control" type="search" placeholder="Search" aria-label="Search" name=""
                                id="">
                        </form>
                    </li>
                    <li><a href="#" title="Messages"><i class="bi bi-envelope-fill"></i></a></li>
                    <li><a href="#" title="My Stuffs"><i class="bi bi-folder-fill"></i></a></li>
                    <li><a href="#"><i></i> Join&nbsp;dijidaro</a></li>
                    <li><a href="#"><i></i> Login</a></li>
                </ul>
                <a href="#" class="close" aria-label="Close navigation panel">
                    <span class="visually-hidden">Close navigation panel</span>
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </a>
            </nav>
        </div>
    </header>
    <main>
        {% block body %} {% endblock %}
    </main>
    <footer>
        
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
        integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
        crossorigin="anonymous"></script>
</body>

</html>
