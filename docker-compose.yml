volumes:
  daro-data:

services:
  db:
      image: postgres:latest
      restart: always
      environment:
        POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      volumes:
        - daro-data:/var/lib/postgresql/data
      ports:
        - "5432:5432"
  web:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./app:/user/src/app
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
